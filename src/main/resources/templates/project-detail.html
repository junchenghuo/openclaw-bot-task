<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务中台 - 项目详情</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body data-auto-refresh-seconds="3">
<div class="bg-shape"></div>
<main class="page">
    <header class="topbar">
        <h1>项目详情</h1>
        <nav class="main-nav">
            <a class="nav-link" href="/">数据大盘</a>
            <a class="nav-link is-active" href="/projects">项目中心</a>
            <a class="nav-link" href="/monitor">系统监控</a>
            <a class="nav-link nav-api" href="/swagger-ui.html">API 文档</a>
        </nav>
    </header>

    <section class="panel">
        <h2 th:text="${project.projectName}">项目名</h2>
        <p><strong>项目编码：</strong><span th:text="${project.projectCode}">PJT-001</span></p>
        <p><strong>状态：</strong><span class="status" th:classappend="${@displayText.projectStatusClass(project.status)}" th:text="${@displayText.projectStatus(project.status)}">启用中</span></p>
        <p><strong>说明：</strong><span th:text="${project.description}">描述</span></p>
    </section>

    <section class="panel">
        <h2>任务列表</h2>
        <form class="toolbar"
              th:attr="hx-get=@{'/projects/' + ${project.id} + '/tasks-fragment'}"
              hx-target="#taskTableContainer"
              hx-trigger="change from:#statusSelect">
            <label for="statusSelect">状态筛选</label>
            <select id="statusSelect" name="status">
                <option value="">全部</option>
                <option th:each="s : ${allStatuses}"
                        th:value="${s}"
                        th:text="${@displayText.taskStatus(s)}"
                        th:selected="${status != null and status.name() == s.name()}"></option>
            </select>
        </form>
        <div id="taskTableContainer" th:replace="~{fragments/task-table :: taskTable(tasks=${tasks})}"></div>
    </section>
</main>
<script th:src="@{/js/auto-refresh.js}"></script>
</body>
</html>
