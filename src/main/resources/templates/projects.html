<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务中台 - 项目列表</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body data-auto-refresh-seconds="3">
<div class="bg-shape"></div>
<main class="page">
    <header class="topbar">
        <h1>项目列表</h1>
        <nav class="main-nav">
            <a class="nav-link" href="/">数据大盘</a>
            <a class="nav-link is-active" href="/projects">项目中心</a>
            <a class="nav-link" href="/monitor">系统监控</a>
            <a class="nav-link nav-api" href="/swagger-ui.html">API 文档</a>
        </nav>
    </header>

    <article class="panel">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>项目编码</th>
                <th>项目名称</th>
                <th>状态</th>
                <th>描述</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="project : ${projects}">
                <td th:text="${project.id}">1</td>
                <td th:text="${project.projectCode}">PJT-001</td>
                <td th:text="${project.projectName}">项目A</td>
                <td>
                    <span class="status"
                          th:classappend="${@displayText.projectStatusClass(project.status)}"
                          th:text="${@displayText.projectStatus(project.status)}">启用中</span>
                </td>
                <td th:text="${project.description}">描述</td>
                <td><a th:href="@{'/projects/' + ${project.id}}">查看详情</a></td>
            </tr>
            </tbody>
        </table>
    </article>
</main>
<script th:src="@{/js/auto-refresh.js}"></script>
</body>
</html>
