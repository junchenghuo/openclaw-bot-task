<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务中台 - 任务中心</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body data-auto-refresh-seconds="3">
<div class="bg-shape"></div>
<main class="page">
    <header class="topbar">
        <h1>任务中心</h1>
        <nav class="main-nav">
            <a class="nav-link" href="/">数据大盘</a>
            <a class="nav-link" href="/projects">项目中心</a>
            <a class="nav-link is-active" href="/task-center">任务中心</a>
            <a class="nav-link" href="/meetings">会议中心</a>
            <a class="nav-link" href="/monitor">系统监控</a>
            <a class="nav-link nav-api" href="/swagger-ui.html">API 文档</a>
        </nav>
    </header>

    <section class="panel">
        <p class="toast" th:if="${toastMessage != null}" th:text="${toastMessage}">任务已删除</p>
        <form class="toolbar" method="get" action="/task-center">
            <label for="projectId">项目筛选</label>
            <select id="projectId" name="projectId" onchange="this.form.submit()">
                <option value="">全部项目</option>
                <option th:each="p : ${projects}"
                        th:value="${p.id}"
                        th:text="${p.projectName}"
                        th:selected="${selectedProjectId != null and selectedProjectId == p.id}"></option>
            </select>

            <label for="status">状态筛选</label>
            <select id="status" name="status" onchange="this.form.submit()">
                <option value="">全部</option>
                <option th:each="s : ${allStatuses}"
                        th:value="${s}"
                        th:text="${@displayText.taskStatus(s)}"
                        th:selected="${status != null and status.name() == s.name()}"></option>
            </select>
        </form>

        <table>
            <thead>
            <tr>
                <th>任务编号</th>
                <th>所属项目</th>
                <th>标题</th>
                <th>类型</th>
                <th>状态</th>
                <th>优先级</th>
                <th>负责人</th>
                <th>计划完成</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(tasks)}">
                <td colspan="9">暂无任务</td>
            </tr>
            <tr th:each="task : ${tasks}">
                <td th:text="${task.taskCode}">TASK-001</td>
                <td th:text="${task.project.projectName}">日常工作</td>
                <td th:text="${task.title}">任务标题</td>
                <td th:text="${@displayText.taskType(task.taskType)}">通用</td>
                <td><span class="status" th:classappend="${@displayText.taskStatusClass(task.status)}" th:text="${@displayText.taskStatus(task.status)}">进行中</span></td>
                <td th:text="${@displayText.taskPriority(task.priority)}">高</td>
                <td th:text="${task.ownerName}">张三</td>
                <td th:text="${@displayText.dateTime(task.plannedFinishAt)}">2026-03-14 18:00:00</td>
                <td class="actions-cell">
                    <a th:href="@{'/tasks/' + ${task.id}}">查看详情</a>
                    <form th:action="@{'/tasks/' + ${task.id} + '/delete'}" method="post" class="inline-form">
                        <button type="submit"
                                class="danger-btn"
                                onclick="return confirm('确认删除该任务吗？该任务的日志和事件也会一起删除，且不可恢复。');">删除任务</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
<script th:src="@{/js/auto-refresh.js}"></script>
</body>
</html>
